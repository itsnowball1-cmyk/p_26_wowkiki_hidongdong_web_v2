# NAS 배포용 compose. /volume1/docker/hidongdong_web/ 에서 실행됨.
# .env 가 같은 디렉터리에 있어야 함 (DB 비밀번호 등).

services:
  db:
    image: mariadb:10.3
    container_name: hidongdong-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: ${DB_DATABASE:-wowkiki}
    volumes:
      - hidongdong-db-data:/var/lib/mysql
      # 데이터 dump(db/dump.sql) 적재 후 271833 스키마 추가분(schema-delta)을 얹음
      - ./db/dump.sql:/tmp/dump.sql:ro
      - ./db/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./db/schema-delta.sql:/docker-entrypoint-initdb.d/02-schema-delta.sql:ro
      - ./db/tb_terms-202606021644.sql:/docker-entrypoint-initdb.d/03-tb-terms.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # healthcheck.sh 는 기본 credential 만 사용해서 root 비번 설정시 실패함.
      # mysqladmin ping 으로 직접 확인.
      test: ["CMD-SHELL", "mysqladmin --user=root --password=$$MYSQL_ROOT_PASSWORD ping --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hidongdong-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:-wowkiki}
      FILES_BASE_URL: ${FILES_BASE_URL:-}
      FILES_ORIGIN: ${FILES_ORIGIN:-}
      # Unity 클라이언트 음성파일 업로드 저장 위치(컨테이너 내부). 아래 volume 과 짝.
      DATACENTER_DIR: /dataCenter
      ALIGO_KEY: ${ALIGO_KEY:-}
      ALIGO_USER_ID: ${ALIGO_USER_ID:-}
      ALIGO_SENDER: ${ALIGO_SENDER:-}
      PORT: 4011
    ports:
      - "4011:4011"
    volumes:
      # 파일 서버(files_wowkiki)가 서빙하는 NAS dataCenter 디렉터리를 RW 로 공유.
      # 업로드된 wav 가 즉시 api.wowkiki.kr/dataCenter/... 로 노출됨.
      - /volume1/docker/files_wowkiki/dataCenter:/dataCenter
      # 단어 사전 외부 편집 — 호스트 파일을 컨테이너 내부 사전 위치에 read-only 마운트.
      # 호스트 측 파일은 deploy 시 한 번 복사돼야 하며, 운영 중 호스트에서 직접 편집 후
      # api 컨테이너 재시작(또는 향후 admin endpoint 로 캐시 invalidate)하면 반영.
      - /volume1/docker/hidongdong_web/data/words_dic.txt:/app/dist-server/data/words_dic.txt:ro
    networks:
      - default
      - wowkiki-net   # files_wowkiki(nginx)가 api.wowkiki.kr/api/ 를 프록시할 수 있도록 공유
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hidongdong-web
    restart: unless-stopped
    ports:
      - "3011:80"
    depends_on:
      - api

volumes:
  hidongdong-db-data:

networks:
  # 사전 생성 필요(1회): docker network create wowkiki-net
  wowkiki-net:
    external: true
