server {
    listen 80;
    server_name _;

    # CORS — hidongdong.wowkiki.kr 의 SPA 가 오디오 fetch/Range 요청을 보낼 수 있도록
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # OPTIONS 프리플라이트
    if ($request_method = OPTIONS) {
        return 204;
    }

    # 정적 파일 서빙 (AWS nginx 의 back-ssl vhost 와 동일 동작)
    location ^~ /dataCenter/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public" always;
        # Range 요청(206) 지원 — nginx 기본
    }

    # /dataCenter 외 모든 요청 → api(TS) 컨테이너로 프록시.
    # Unity 클라이언트(p_25)의 레거시 평문 루트 엔드포인트(/alogin, /member_list,
    # /storage/fileup_duck, …)와 신규 /api/* 를 모두 처리. hidongdong-api 는
    # wowkiki-net 공유 네트워크로 도달. (^~ /dataCenter/ 가 우선 매치되어 정적은 그대로.)
    location / {
        proxy_pass http://hidongdong-api:4011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # GET 본문(Unity 클라이언트) 보존 + 음성파일 base64 본문 크기/타임아웃 여유.
        proxy_pass_request_body on;
        client_max_body_size 64m;
        proxy_read_timeout 120s;
    }
}
