# NAS 개발(dev) 배포용 compose. /volume1/docker/hidongdong_web_dev/ 에서 실행됨.
# 운영(/volume1/docker/hidongdong_web/) 와 같은 NAS 에서 분리 운용:
#   - 포트: web 3012 / api 4012  (운영은 3011 / 4011)
#   - 컨테이너 이름: hidongdong-dev-*  (운영은 hidongdong-*)
#   - DB 볼륨: hidongdong-dev-db-data  (운영과 별도)
# Dockerfile/nginx.conf 는 운영(deploy/nas/) 의 것을 동일하게 복사해 둠.

services:
  db:
    image: mariadb:10.3
    container_name: hidongdong-dev-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: ${DB_DATABASE:-wowkiki}
    volumes:
      - hidongdong-dev-db-data:/var/lib/mysql
      - ./db/dump.sql:/tmp/dump.sql:ro
      - ./db/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./db/schema-delta.sql:/docker-entrypoint-initdb.d/02-schema-delta.sql:ro
      - ./db/tb_terms-202606021644.sql:/docker-entrypoint-initdb.d/03-tb-terms.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin --user=root --password=$$MYSQL_ROOT_PASSWORD ping --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hidongdong-dev-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:-wowkiki}
      FILES_BASE_URL: ${FILES_BASE_URL:-}
      FILES_ORIGIN: ${FILES_ORIGIN:-}
      ALIGO_KEY: ${ALIGO_KEY:-}
      ALIGO_USER_ID: ${ALIGO_USER_ID:-}
      ALIGO_SENDER: ${ALIGO_SENDER:-}
      # 컨테이너 내부 포트는 4011 로 고정 — nginx.conf 가 api:4011 로 프록시함.
      # 호스트 포트만 4012 로 매핑해서 운영(4011) 과 충돌 회피.
      PORT: 4011
    ports:
      - "4012:4011"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hidongdong-dev-web
    restart: unless-stopped
    ports:
      - "3012:80"
    depends_on:
      - api

volumes:
  hidongdong-dev-db-data:
